<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Task Management Dashboard</h1>

<form
action="/add_task"
method="POST">

<input
type="text"
name="task_name"
placeholder="Enter Task"
required>

<button type="submit">

Add Task

</button>

</form>

<h2>Task List</h2>

{% for task in tasks %}

<div class="task">

<p>

{{ task[1] }}

-

{{ task[2] }}

</p>

<a href="/delete_task/{{ task[0] }}">

Delete

</a>

</div>

{% endfor %}

</body>
</html>
